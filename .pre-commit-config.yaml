repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix --exit-non-zero-on-fix
        language: python
        additional_dependencies:
          - ruff>=0.4
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: python
        additional_dependencies:
          - ruff>=0.4
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: mypy --config-file pyproject.toml
        language: python
        additional_dependencies:
          - cryptography>=42.0
          - mypy>=1.8
          - requests>=2.31
          - types-requests>=2.31
        pass_filenames: false
        types_or: [python, pyi]
